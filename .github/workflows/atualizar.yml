name: Atualizar Federal

on:
  workflow_dispatch:

jobs:
  atualizar:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Instalar Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Executar motor
        run: node scripts/atualizar-federal.js

      - name: Configurar Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit das alterações
        run: |
          git add api/federal.json
          git diff --cached --quiet || git commit -m "Atualiza resultado da Federal"

      - name: Enviar para o GitHub
        run: git push